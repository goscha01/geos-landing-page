<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geos Admin - Project Dashboard</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0b; --bg-secondary: #111113; --bg-card: #18181b;
            --text-primary: #fafafa; --text-secondary: #a1a1aa;
            --accent: #6b7280; --accent-light: #9ca3af;
            --border: #27272a; --border-hover: #3f3f46;
            --success: #22c55e; --warning: #f59e0b; --error: #ef4444; --info: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; min-height: 100vh; }

        /* Login */
        .login-overlay { position: fixed; inset: 0; z-index: 1000; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; transition: opacity 0.4s, visibility 0.4s; }
        .login-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .login-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 48px; width: 100%; max-width: 420px; text-align: center; }
        .login-card .logo-text { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700; letter-spacing: 0.15em; margin-bottom: 8px; }
        .login-card .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 32px; }
        .login-card input { width: 100%; padding: 12px 16px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 0.95rem; font-family: 'DM Sans', sans-serif; margin-bottom: 16px; outline: none; transition: border-color 0.2s; }
        .login-card input:focus { border-color: var(--accent-light); }
        .login-card input::placeholder { color: var(--accent); }
        .login-error { color: var(--error); font-size: 0.85rem; margin-bottom: 12px; min-height: 20px; }
        .login-btn { width: 100%; padding: 12px; background: var(--text-primary); color: var(--bg-primary); border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity 0.2s; }
        .login-btn:hover { opacity: 0.9; }

        /* Dashboard */
        .dashboard { display: none; }
        .dashboard.visible { display: block; }
        .topbar { position: sticky; top: 0; z-index: 50; background: rgba(10,10,11,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
        .topbar-left { display: flex; align-items: center; gap: 16px; }
        .topbar-logo { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 0.12em; color: var(--text-primary); text-decoration: none; }
        .topbar-divider { width: 1px; height: 24px; background: var(--border); }
        .topbar-title { color: var(--text-secondary); font-size: 0.95rem; }
        .topbar-right { display: flex; align-items: center; gap: 16px; }
        .topbar-time { color: var(--text-secondary); font-size: 0.85rem; }
        .btn-outline { padding: 8px 16px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text-secondary); font-size: 0.85rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
        .btn-outline:hover { border-color: var(--accent-light); color: var(--text-primary); }
        .btn-outline.danger:hover { border-color: var(--error); color: var(--error); }

        /* Summary */
        .summary-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; padding: 24px 32px 0; }
        .summary-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 18px 22px; }
        .summary-label { font-size: 0.72rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
        .summary-value { font-size: 1.6rem; font-weight: 700; }
        .summary-sub { font-size: 0.78rem; color: var(--text-secondary); margin-top: 4px; }
        .green { color: var(--success); } .red { color: var(--error); } .blue { color: var(--info); } .yellow { color: var(--warning); }

        /* Section */
        .projects-section { padding: 24px 32px 48px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 1.1rem; font-weight: 600; }
        .refresh-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; color: var(--text-secondary); font-size: 0.85rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
        .refresh-btn:hover { border-color: var(--accent-light); color: var(--text-primary); }
        .refresh-btn.spinning svg { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Grid: 4 per row matching summary cards */
        .projects-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

        /* Project card (compact) */
        .project-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; cursor: pointer; transition: border-color 0.2s; }
        .project-card:hover { border-color: var(--border-hover); }
        .project-card.expanded { border-color: var(--accent); }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
        .card-top-left { flex: 1; }
        .project-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 2px; }
        .project-desc { font-size: 0.78rem; color: var(--text-secondary); }

        .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 100px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
        .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
        .status-badge.healthy { background: rgba(34,197,94,0.12); color: var(--success); }
        .status-badge.healthy .dot { background: var(--success); }
        .status-badge.degraded { background: rgba(245,158,11,0.12); color: var(--warning); }
        .status-badge.degraded .dot { background: var(--warning); }
        .status-badge.down { background: rgba(239,68,68,0.12); color: var(--error); }
        .status-badge.down .dot { background: var(--error); }
        .status-badge.paused { background: rgba(107,114,128,0.15); color: var(--accent-light); }
        .status-badge.paused .dot { background: var(--accent-light); }
        .status-badge.deploying { background: rgba(59,130,246,0.12); color: var(--info); }
        .status-badge.deploying .dot { background: var(--info); animation: pulse-dot 1.5s infinite; }
        @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Card stats row */
        .card-stats { display: flex; gap: 20px; margin-bottom: 10px; }
        .card-stat { display: flex; flex-direction: column; gap: 2px; }
        .card-stat-label { font-size: 0.68rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
        .card-stat-value { font-size: 0.92rem; font-weight: 600; }

        .expand-icon { display: flex; justify-content: center; margin-top: 8px; color: var(--accent); transition: color 0.2s; }
        .project-card:hover .expand-icon { color: var(--text-secondary); }
        .expand-icon svg { transition: transform 0.3s; }
        .project-card.expanded .expand-icon svg { transform: rotate(180deg); }

        /* Expanded details */
        .card-details { max-height: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s; opacity: 0; }
        .project-card.expanded .card-details { max-height: 800px; opacity: 1; margin-top: 14px; }
        .details-inner { padding-top: 14px; border-top: 1px solid var(--border); }

        /* Component rows */
        .comp-row { display: grid; grid-template-columns: 100px 70px 1fr 70px 60px; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(39,39,42,0.5); font-size: 0.82rem; }
        .comp-row:last-child { border-bottom: none; }
        .comp-label { font-weight: 600; }
        .comp-status { }
        .comp-detail { color: var(--text-secondary); font-size: 0.78rem; }
        .comp-cost { text-align: right; color: var(--info); font-weight: 500; }
        .comp-errors { text-align: right; font-weight: 500; }

        /* Error list */
        .error-list { margin-top: 8px; padding: 8px 12px; background: rgba(239,68,68,0.06); border-radius: 8px; }
        .error-item { display: flex; align-items: flex-start; gap: 6px; padding: 3px 0; font-size: 0.75rem; }
        .error-icon { color: var(--error); flex-shrink: 0; margin-top: 2px; }
        .error-time { color: var(--text-secondary); margin-left: auto; white-space: nowrap; }

        /* Pause all button in expanded */
        .detail-actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
        .pause-btn { display: flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 8px; font-size: 0.8rem; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); transition: all 0.2s; }
        .pause-btn:hover { border-color: var(--warning); color: var(--warning); }
        .pause-btn.resume:hover { border-color: var(--success); color: var(--success); }
        .pause-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Drag and drop */
        .project-card[draggable="true"] { cursor: grab; }
        .project-card.dragging { opacity: 0.4; cursor: grabbing; }
        .project-card.drag-over { border-color: var(--info); box-shadow: 0 0 0 1px var(--info); }

        /* Deploy bar on card */
        .card-deploy { margin-bottom: 6px; }
        .card-deploy-label { display: flex; justify-content: space-between; font-size: 0.68rem; color: var(--text-secondary); margin-bottom: 4px; }
        .card-deploy-detail { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--text-secondary); margin-top: 4px; }
        .env-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
        .env-badge.production { background: rgba(239,68,68,0.15); color: var(--error); }
        .env-badge.staging { background: rgba(245,158,11,0.15); color: var(--warning); }
        .env-badge.development { background: rgba(59,130,246,0.15); color: var(--info); }
        .card-deploy-bar { width: 100%; height: 4px; background: var(--bg-secondary); border-radius: 2px; overflow: hidden; }
        .card-deploy-fill { height: 100%; border-radius: 2px; transition: width 0.6s; }
        .card-deploy-fill.success { background: var(--success); }
        .card-deploy-fill.in-progress { background: var(--info); animation: bar-pulse 2s infinite; }
        .card-deploy-fill.failed { background: var(--error); }
        @keyframes bar-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* Responsive */
        @media (max-width: 1200px) { .projects-grid { grid-template-columns: repeat(2, 1fr); } .summary-row { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 700px) { .projects-grid { grid-template-columns: 1fr; } .summary-row { grid-template-columns: 1fr 1fr; } .topbar { padding: 14px 16px; } .summary-row, .projects-section { padding-left: 16px; padding-right: 16px; } .comp-row { grid-template-columns: 80px 60px 1fr 50px; } }
    </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
    <div class="login-card">
        <div class="logo-text">GEOS</div>
        <div class="subtitle">Admin Dashboard</div>
        <input type="text" id="loginUser" placeholder="Username" autocomplete="username">
        <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password">
        <div class="login-error" id="loginError"></div>
        <button class="login-btn" id="loginBtn">Sign In</button>
    </div>
</div>

<div class="dashboard" id="dashboard">
    <div class="topbar">
        <div class="topbar-left">
            <a href="index.html" class="topbar-logo">GEOS</a>
            <div class="topbar-divider"></div>
            <span class="topbar-title">Project Dashboard</span>
        </div>
        <div class="topbar-right">
            <span class="topbar-time" id="clock"></span>
            <button class="btn-outline danger" id="logoutBtn">Sign Out</button>
        </div>
    </div>

    <div class="summary-row">
        <div class="summary-card">
            <div class="summary-label">Projects</div>
            <div class="summary-value" id="sumTotal">-</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">Healthy</div>
            <div class="summary-value green" id="sumHealthy">-</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">Errors (24h)</div>
            <div class="summary-value red" id="sumErrors">-</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">Cost (MTD)</div>
            <div class="summary-value blue" id="sumCost">-</div>
            <div class="summary-sub" id="sumCostDays"></div>
        </div>
        <div class="summary-card">
            <div class="summary-label">Forecast</div>
            <div class="summary-value yellow" id="sumForecast">-</div>
            <div class="summary-sub">projected end of month</div>
        </div>
    </div>

    <div class="projects-section">
        <div class="section-header">
            <div class="section-title">Projects</div>
            <button class="refresh-btn" id="refreshBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                Refresh
            </button>
        </div>
        <div class="projects-grid" id="projectsGrid"></div>
    </div>
</div>

<script>
const API_URL = 'https://wqbjps7skhyhlvdy2li7nmpdtm0okjdb.lambda-url.us-east-1.on.aws/';
const API_TOKEN = 'ZX7AcYCY8kxEo857spMlXWykeEbCWwNa';
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'geos2026';

let projects = [];
let costInfo = {};
let expandedId = null;

// Auth
function checkSession() { return sessionStorage.getItem('geos_admin') === 'true'; }
function login() {
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;
    if (u === ADMIN_USER && p === ADMIN_PASS) {
        sessionStorage.setItem('geos_admin', 'true');
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('dashboard').classList.add('visible');
        document.getElementById('loginError').textContent = '';
        fetchData();
    } else { document.getElementById('loginError').textContent = 'Invalid credentials'; }
}
function logout() {
    sessionStorage.removeItem('geos_admin');
    document.getElementById('loginOverlay').classList.remove('hidden');
    document.getElementById('dashboard').classList.remove('visible');
}
document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('logoutBtn').addEventListener('click', logout);
if (checkSession()) { document.getElementById('loginOverlay').classList.add('hidden'); document.getElementById('dashboard').classList.add('visible'); fetchData(); }

// Clock
function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
updateClock(); setInterval(updateClock, 1000);

// Fetch
async function fetchData() {
    try {
        const r = await fetch(API_URL, { headers: API_TOKEN ? { Authorization: `Bearer ${API_TOKEN}` } : {} });
        if (!r.ok) throw new Error(r.status);
        const data = await r.json();
        projects = data.projects || [];
        costInfo = data.cost || {};
    } catch (e) { console.error('API error:', e); }
    renderAll();
}

// Pause/Resume
async function pauseProject(projectId, action) {
    try {
        await fetch(API_URL + 'pause', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${API_TOKEN}` },
            body: JSON.stringify({ projectId, action }),
        });
        await fetchData();
    } catch (e) { alert('Failed: ' + e.message); }
}

// Render
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function statusLabel(s) { return { healthy:'Healthy', degraded:'Degraded', down:'Down', paused:'Paused', deploying:'Deploying' }[s] || s; }
function $(s) { return s === 0 ? 'Free' : '$' + s.toFixed(2); }
function fmtDate(d) { if (!d) return '-'; const dt = new Date(d); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); }
function badge(st) { return `<span class="status-badge ${st}"><span class="dot"></span>${statusLabel(st)}</span>`; }

function fmtElapsed(startIso) {
    if (!startIso) return '';
    const ms = Date.now() - new Date(startIso).getTime();
    const s = Math.floor(ms / 1000);
    if (s < 60) return `${s}s ago`;
    const m = Math.floor(s / 60);
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    return `${h}h ${m % 60}m ago`;
}

function deployBarHtml(proj) {
    const comps = (proj.components || []).filter(c => c.deployStatus);
    if (comps.length === 0) return '';
    let ds = 'success', dp = 100, lastDeploy = null, deployStarted = null, commitSha = null, ghRepo = null;
    for (const c of comps) {
        if (c.deployStatus === 'in-progress') { ds = 'in-progress'; dp = c.deployProgress ?? 50; deployStarted = c.deployStarted; }
        else if (c.deployStatus === 'failed' && ds !== 'in-progress') { ds = 'failed'; dp = 100; }
        if (c.lastDeploy && (!lastDeploy || c.lastDeploy > lastDeploy)) lastDeploy = c.lastDeploy;
        if (c.commitSha && !commitSha) { commitSha = c.commitSha; ghRepo = c.ghRepo; }
    }

    let label, left;
    if (ds === 'in-progress') {
        label = `Deploying ${dp}%`;
        left = deployStarted ? fmtElapsed(deployStarted) : '';
    } else if (ds === 'failed') {
        label = 'Deploy Failed';
        left = '';
    } else {
        label = 'Deployed';
        left = '';
    }

    // Build second-line details: env badge, last deploy time, commit hash
    const detailParts = [];
    if (lastDeploy) detailParts.push(fmtDate(lastDeploy));
    if (ds === 'in-progress' && deployStarted) detailParts.push(`started ${fmtElapsed(deployStarted)}`);
    if (commitSha) {
        const short = commitSha.substring(0, 7);
        const link = ghRepo ? `<a href="https://github.com/${ghRepo}/commit/${commitSha}" target="_blank" style="color:var(--info);text-decoration:none;font-family:monospace" title="${commitSha}">${short}</a>` : `<span style="font-family:monospace">${short}</span>`;
        detailParts.push(link);
    }

    const detailLine = detailParts.length > 0 ? `<div class="card-deploy-detail"><span>${detailParts.join(' &middot; ')}</span></div>` : '';

    return `<div class="card-deploy">
        <div class="card-deploy-label"><span>${left}</span><span>${label}</span></div>
        <div class="card-deploy-bar"><div class="card-deploy-fill ${ds}" style="width:${dp}%"></div></div>
        ${detailLine}
    </div>`;
}

function renderAll() {
    // Summary
    const total = projects.length;
    const healthy = projects.filter(p => p.status === 'healthy').length;
    const errors = projects.reduce((n, p) => n + (p.errors24h || 0), 0);
    document.getElementById('sumTotal').textContent = total;
    document.getElementById('sumHealthy').textContent = healthy;
    document.getElementById('sumErrors').textContent = errors;
    document.getElementById('sumCost').textContent = costInfo.total != null ? $(costInfo.total) : '-';
    document.getElementById('sumCostDays').textContent = costInfo.dayOfMonth ? `day ${costInfo.dayOfMonth} of ${costInfo.daysInMonth}` : '';
    document.getElementById('sumForecast').textContent = costInfo.forecast != null ? $(costInfo.forecast) : '-';

    // Projects — apply saved sort order
    const savedOrder = JSON.parse(localStorage.getItem('geos_card_order') || '[]');
    const sorted = [...projects].sort((a, b) => {
        const ai = savedOrder.indexOf(a.id), bi = savedOrder.indexOf(b.id);
        if (ai === -1 && bi === -1) return 0;
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
    });

    const grid = document.getElementById('projectsGrid');
    grid.innerHTML = '';
    let dragSrcId = null;

    sorted.forEach(p => {
        const isExp = expandedId === p.id;
        const hasEcs = (p.components || []).some(c => c.type === 'ecs');
        const pausableComps = (p.components || []).filter(c => c.type === 'ecs' || c.type === 'rds');
        const allPaused = pausableComps.length > 0 && pausableComps.every(c => c.paused);

        // Components HTML for expanded view
        const compsHtml = (p.components || []).map(c => {
            let detail = '';
            if (c.type === 'ecs') {
                detail = `${c.running}/${c.desired} tasks`;
                if (c.deployStatus === 'in-progress') {
                    detail += ` &middot; <span style="color:var(--info)">deploying ${c.deployProgress}%</span>`;
                    if (c.deployStarted) detail += ` &middot; started ${fmtElapsed(c.deployStarted)}`;
                }
                if (c.lastDeploy) detail += ` &middot; ${fmtDate(c.lastDeploy)}`;
                if (c.commitSha) {
                    const short = c.commitSha.substring(0, 7);
                    const ghUrl = c.ghRepo ? `https://github.com/${c.ghRepo}/commit/${c.commitSha}` : null;
                    detail += ` &middot; ${ghUrl ? `<a href="${ghUrl}" target="_blank" style="color:var(--info);text-decoration:none;font-family:monospace" title="${c.commitSha}">${short}</a>` : `<span style="font-family:monospace">${short}</span>`}`;
                }
                if (c.taskDefRevision) detail += ` &middot; rev:${c.taskDefRevision}`;
            } else if (c.type === 'static') {
                detail = c.lastDeploy ? `last: ${fmtDate(c.lastDeploy)}` : 'deployed';
            } else if (c.type === 'rds') {
                const dbSt = c.dbStatus || 'unknown';
                const color = dbSt === 'available' ? 'var(--success)' : dbSt === 'stopped' ? 'var(--accent-light)' : 'var(--info)';
                detail = `<span style="color:${color}">${dbSt}</span>`;
            } else if (c.type === 'external') {
                const prov = c.provider || 'external';
                const provColor = prov === 'vercel' ? '#fff' : prov === 'railway' ? '#c084fc' : prov === 'supabase' ? '#3ecf8e' : 'var(--accent-light)';
                detail = `<span style="color:${provColor};font-weight:500;text-transform:capitalize">${esc(prov)}</span>`;
                if (c.latencyMs) detail += ` &middot; ${c.latencyMs}ms`;
                if (c.httpStatus && c.httpStatus !== 200) detail += ` &middot; HTTP ${c.httpStatus}`;
                if (c.publicUrl) detail += ` &middot; <a href="${esc(c.publicUrl)}" target="_blank" style="color:var(--info);text-decoration:none;font-size:0.75rem">open</a>`;
                if (c.note) detail += ` &middot; <span style="color:var(--accent-light);font-style:italic">${esc(c.note)}</span>`;
            } else if (c.type === 'placeholder') {
                detail = `<span style="color:var(--accent-light);font-style:italic">${esc(c.note || 'coming soon')}</span>`;
            } else {
                detail = 'managed';
            }

            const errHtml = (c.recentErrors || []).length > 0
                ? `</div><div class="error-list" style="grid-column:1/-1">${(c.recentErrors||[]).slice(0,3).map(e =>
                    `<div class="error-item"><span class="error-icon"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></span><span>${esc(e.msg)}</span><span class="error-time">${esc(e.time)}</span></div>`
                  ).join('')}</div><div>` : '';

            return `<div class="comp-row">
                <span class="comp-label">${esc(c.label)}</span>
                ${badge(c.status || 'healthy')}
                <span class="comp-detail">${detail}</span>
                <span class="comp-cost">${$(c.costMtd || 0)}</span>
                <span class="comp-errors" style="color:${(c.errors24h||0) > 0 ? 'var(--error)' : 'var(--success)'}">${c.errors24h || 0}</span>
                ${errHtml}
            </div>`;
        }).join('');

        const card = document.createElement('div');
        card.className = 'project-card' + (isExp ? ' expanded' : '');
        card.innerHTML = `
            <div class="card-top">
                <div class="card-top-left">
                    <div class="project-name">${esc(p.name)} <span class="env-badge ${esc(p.env || '')}">${esc(p.env || '')}</span></div>
                    <div class="project-desc">${esc(p.description || '')}${p.stack ? ` <span style="color:var(--accent-light);font-size:0.75rem">&middot; ${esc(p.stack)}</span>` : ''}</div>
                </div>
                ${badge(p.status)}
            </div>
            <div class="card-stats">
                <div class="card-stat">
                    <span class="card-stat-label">Cost MTD</span>
                    <span class="card-stat-value blue">${$(p.costMtd || 0)}</span>
                </div>
                <div class="card-stat">
                    <span class="card-stat-label">Forecast</span>
                    <span class="card-stat-value yellow">${$(p.costForecast || 0)}</span>
                </div>
                <div class="card-stat">
                    <span class="card-stat-label">Errors</span>
                    <span class="card-stat-value" style="color:${(p.errors24h||0)>0?'var(--error)':'var(--success)'}">${p.errors24h || 0}</span>
                </div>
            </div>
            ${deployBarHtml(p)}
            <div class="expand-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="card-details">
                <div class="details-inner">
                    <div style="display:grid; grid-template-columns:100px 70px 1fr 70px 60px; gap:10px; padding-bottom:6px; font-size:0.7rem; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.06em;">
                        <span>Component</span><span>Status</span><span>Details</span><span style="text-align:right">Cost</span><span style="text-align:right">Errors</span>
                    </div>
                    ${compsHtml}
                    ${hasEcs ? `
                    <div class="detail-actions">
                        <button class="pause-btn ${allPaused ? 'resume' : ''}" data-project="${p.id}" data-action="${allPaused ? 'resume' : 'pause'}" onclick="event.stopPropagation(); handlePause(this)">
                            ${(() => {
                                const hasRds = (p.components || []).some(c => c.type === 'rds');
                                const suffix = hasRds ? ' + DB' : '';
                                return allPaused
                                    ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Resume All' + suffix
                                    : '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Pause All' + suffix;
                            })()}
                        </button>
                    </div>` : ''}
                </div>
            </div>`;
        card.setAttribute('draggable', 'true');
        card.dataset.projectId = p.id;
        card.addEventListener('dragstart', e => { dragSrcId = p.id; card.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
        card.addEventListener('dragend', () => { card.classList.remove('dragging'); dragSrcId = null; grid.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over')); });
        card.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; card.classList.add('drag-over'); });
        card.addEventListener('dragleave', () => { card.classList.remove('drag-over'); });
        card.addEventListener('drop', e => {
            e.preventDefault(); card.classList.remove('drag-over');
            if (!dragSrcId || dragSrcId === p.id) return;
            const cards = [...grid.querySelectorAll('.project-card')];
            const newOrder = cards.map(c => c.dataset.projectId);
            const fromIdx = newOrder.indexOf(dragSrcId);
            const toIdx = newOrder.indexOf(p.id);
            if (fromIdx === -1 || toIdx === -1) return;
            newOrder.splice(fromIdx, 1);
            newOrder.splice(toIdx, 0, dragSrcId);
            localStorage.setItem('geos_card_order', JSON.stringify(newOrder));
            renderAll();
        });
        card.addEventListener('click', e => { if (e.target.closest('.pause-btn')) return; expandedId = expandedId === p.id ? null : p.id; renderAll(); });
        grid.appendChild(card);
    });
}

function handlePause(btn) {
    const pid = btn.dataset.project;
    const action = btn.dataset.action;
    const proj = projects.find(p => p.id === pid);
    if (!proj) return;
    if (!confirm(`Are you sure you want to ${action} all services in "${proj.name}"?`)) return;
    btn.disabled = true;
    btn.textContent = action === 'pause' ? 'Pausing...' : 'Resuming...';
    pauseProject(pid, action);
}

document.getElementById('refreshBtn').addEventListener('click', function() {
    this.classList.add('spinning');
    fetchData().finally(() => setTimeout(() => this.classList.remove('spinning'), 400));
});
</script>
</body>
</html>

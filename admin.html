<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geos Admin - Project Dashboard</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0b;
            --bg-secondary: #111113;
            --bg-card: #18181b;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --accent: #6b7280;
            --accent-light: #9ca3af;
            --border: #27272a;
            --border-hover: #3f3f46;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── Login ── */
        .login-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: var(--bg-primary);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.4s, visibility 0.4s;
        }
        .login-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .login-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 48px;
            width: 100%; max-width: 420px; text-align: center;
        }
        .login-card .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem; font-weight: 700;
            letter-spacing: 0.15em; margin-bottom: 8px;
        }
        .login-card .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 32px; }
        .login-card input {
            width: 100%; padding: 12px 16px;
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-primary);
            font-size: 0.95rem; font-family: 'DM Sans', sans-serif;
            margin-bottom: 16px; outline: none; transition: border-color 0.2s;
        }
        .login-card input:focus { border-color: var(--accent-light); }
        .login-card input::placeholder { color: var(--accent); }
        .login-error { color: var(--error); font-size: 0.85rem; margin-bottom: 12px; min-height: 20px; }
        .login-btn {
            width: 100%; padding: 12px;
            background: var(--text-primary); color: var(--bg-primary);
            border: none; border-radius: 8px;
            font-size: 0.95rem; font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer; transition: opacity 0.2s;
        }
        .login-btn:hover { opacity: 0.9; }

        /* ── Dashboard ── */
        .dashboard { display: none; }
        .dashboard.visible { display: block; }

        .topbar {
            position: sticky; top: 0; z-index: 50;
            background: rgba(10, 10, 11, 0.92); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .topbar-left { display: flex; align-items: center; gap: 16px; }
        .topbar-logo {
            font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700;
            letter-spacing: 0.12em; color: var(--text-primary); text-decoration: none;
        }
        .topbar-divider { width: 1px; height: 24px; background: var(--border); }
        .topbar-title { color: var(--text-secondary); font-size: 0.95rem; }
        .topbar-right { display: flex; align-items: center; gap: 16px; }
        .topbar-time { color: var(--text-secondary); font-size: 0.85rem; }
        .logout-btn {
            padding: 8px 16px; background: transparent;
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text-secondary); font-size: 0.85rem;
            font-family: 'DM Sans', sans-serif; cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }
        .logout-btn:hover { border-color: var(--error); color: var(--error); }

        /* Summary */
        .summary-row {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 16px; padding: 24px 32px 0;
        }
        .summary-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px 24px;
        }
        .summary-label {
            font-size: 0.8rem; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
        }
        .summary-value { font-size: 1.8rem; font-weight: 700; }
        .summary-value.green { color: var(--success); }
        .summary-value.red { color: var(--error); }
        .summary-value.blue { color: var(--info); }

        /* Section */
        .projects-section { padding: 24px 32px 48px; }
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .section-title { font-size: 1.1rem; font-weight: 600; }
        .refresh-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 14px; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text-secondary); font-size: 0.85rem;
            font-family: 'DM Sans', sans-serif; cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }
        .refresh-btn:hover { border-color: var(--accent-light); color: var(--text-primary); }
        .refresh-btn.spinning svg { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-msg {
            text-align: center; padding: 40px;
            color: var(--text-secondary); font-size: 0.95rem;
        }

        /* ── Project Grid: 3 per row ── */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        /* ── Compact Card ── */
        .project-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 14px; padding: 20px 22px;
            cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .project-card:hover { border-color: var(--border-hover); }
        .project-card.expanded { border-color: var(--accent); }

        .card-top {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 14px;
        }
        .card-top-left { flex: 1; min-width: 0; }
        .project-name { font-size: 1rem; font-weight: 600; margin-bottom: 2px; }
        .project-env { font-size: 0.75rem; color: var(--text-secondary); }

        /* Status badge */
        .status-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: 100px;
            font-size: 0.72rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.04em;
            white-space: nowrap; flex-shrink: 0;
        }
        .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
        .status-badge.healthy { background: rgba(34,197,94,0.12); color: var(--success); }
        .status-badge.healthy .dot { background: var(--success); }
        .status-badge.degraded { background: rgba(245,158,11,0.12); color: var(--warning); }
        .status-badge.degraded .dot { background: var(--warning); }
        .status-badge.down { background: rgba(239,68,68,0.12); color: var(--error); }
        .status-badge.down .dot { background: var(--error); }
        .status-badge.paused { background: rgba(107,114,128,0.15); color: var(--accent-light); }
        .status-badge.paused .dot { background: var(--accent-light); }
        .status-badge.deploying { background: rgba(59,130,246,0.12); color: var(--info); }
        .status-badge.deploying .dot { background: var(--info); animation: pulse-dot 1.5s infinite; }
        @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Compact stats row */
        .card-stats {
            display: flex; gap: 16px; margin-bottom: 12px;
        }
        .card-stat {
            display: flex; flex-direction: column; gap: 2px;
        }
        .card-stat-label { font-size: 0.68rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
        .card-stat-value { font-size: 0.9rem; font-weight: 600; }

        /* Deploy bar (compact) */
        .card-deploy-bar {
            width: 100%; height: 4px;
            background: var(--bg-secondary); border-radius: 2px; overflow: hidden;
        }
        .card-deploy-fill {
            height: 100%; border-radius: 2px; transition: width 0.6s ease;
        }
        .card-deploy-fill.success { background: var(--success); }
        .card-deploy-fill.in-progress { background: var(--info); animation: bar-pulse 2s infinite; }
        .card-deploy-fill.failed { background: var(--error); }
        @keyframes bar-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* Expand chevron */
        .expand-icon {
            display: flex; justify-content: center; margin-top: 10px;
            color: var(--accent); transition: color 0.2s;
        }
        .project-card:hover .expand-icon { color: var(--text-secondary); }
        .expand-icon svg { transition: transform 0.3s; }
        .project-card.expanded .expand-icon svg { transform: rotate(180deg); }

        /* ── Expanded Details ── */
        .card-details {
            max-height: 0; overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.3s ease, margin-top 0.3s;
            opacity: 0;
        }
        .project-card.expanded .card-details {
            max-height: 500px; opacity: 1; margin-top: 16px;
        }

        .details-inner {
            padding-top: 16px; border-top: 1px solid var(--border);
        }
        .detail-metrics {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; margin-bottom: 14px;
        }
        .detail-metric { display: flex; flex-direction: column; gap: 3px; }
        .detail-metric-label { font-size: 0.72rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
        .detail-metric-value { font-size: 0.88rem; font-weight: 500; }

        .detail-actions {
            display: flex; gap: 8px; margin-top: 14px;
        }
        .pause-btn {
            display: flex; align-items: center; gap: 5px;
            padding: 6px 12px; border-radius: 7px;
            font-size: 0.78rem; font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary);
            transition: all 0.2s;
        }
        .pause-btn:hover { border-color: var(--warning); color: var(--warning); }
        .pause-btn.paused { border-color: var(--success); color: var(--success); }
        .pause-btn.paused:hover { border-color: var(--success); }
        .pause-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Error list in details */
        .error-list { margin-top: 12px; }
        .error-item {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 0; font-size: 0.78rem;
        }
        .error-icon { color: var(--error); flex-shrink: 0; }
        .error-time { color: var(--text-secondary); margin-left: auto; white-space: nowrap; font-size: 0.72rem; }

        /* ── Responsive ── */
        @media (max-width: 1100px) {
            .projects-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 700px) {
            .summary-row { grid-template-columns: repeat(2, 1fr); }
            .projects-grid { grid-template-columns: 1fr; }
            .topbar { padding: 14px 16px; }
            .summary-row, .projects-section { padding-left: 16px; padding-right: 16px; }
        }
    </style>
</head>
<body>

<!-- Login -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-card">
        <div class="logo-text">GEOS</div>
        <div class="subtitle">Admin Dashboard</div>
        <input type="text" id="loginUser" placeholder="Username" autocomplete="username">
        <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password">
        <div class="login-error" id="loginError"></div>
        <button class="login-btn" id="loginBtn">Sign In</button>
    </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
    <div class="topbar">
        <div class="topbar-left">
            <a href="index.html" class="topbar-logo">GEOS</a>
            <div class="topbar-divider"></div>
            <span class="topbar-title">Project Dashboard</span>
        </div>
        <div class="topbar-right">
            <span class="topbar-time" id="clock"></span>
            <button class="logout-btn" id="logoutBtn">Sign Out</button>
        </div>
    </div>

    <div class="summary-row">
        <div class="summary-card">
            <div class="summary-label">Total Projects</div>
            <div class="summary-value" id="sumTotal">-</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">Healthy</div>
            <div class="summary-value green" id="sumHealthy">-</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">Errors (24h)</div>
            <div class="summary-value red" id="sumErrors">-</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">AWS Cost (MTD)</div>
            <div class="summary-value blue" id="sumCost">-</div>
        </div>
    </div>

    <div class="projects-section">
        <div class="section-header">
            <div class="section-title">Projects</div>
            <button class="refresh-btn" id="refreshBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                Refresh
            </button>
        </div>
        <div class="projects-grid" id="projectsGrid">
            <div class="loading-msg">Loading project data...</div>
        </div>
    </div>
</div>

<script>
// =========================================================================
// Config
// =========================================================================
const API_URL = 'https://wqbjps7skhyhlvdy2li7nmpdtm0okjdb.lambda-url.us-east-1.on.aws/';
const API_TOKEN = 'ZX7AcYCY8kxEo857spMlXWykeEbCWwNa';

const ADMIN_USER = 'admin';
const ADMIN_PASS = 'geos2026';

// Fallback data when API is not yet configured
const FALLBACK_PROJECTS = [
    { id: 'leadbridge-api', name: 'LeadBridge API', env: 'Production  ·  AWS ECS', status: 'healthy', deployStatus: 'success', deployProgress: 100, lastDeploy: null, errors24h: 0, recentErrors: [], paused: false },
    { id: 'sigcore-api', name: 'Sigcore API', env: 'Production  ·  AWS ECS', status: 'healthy', deployStatus: 'success', deployProgress: 100, lastDeploy: null, errors24h: 0, recentErrors: [], paused: false },
    { id: 'checkcapture-api', name: 'CheckCapture API', env: 'Production  ·  AWS ECS', status: 'healthy', deployStatus: 'success', deployProgress: 100, lastDeploy: null, errors24h: 0, recentErrors: [], paused: false },
    { id: 'leadbridge-frontend', name: 'LeadBridge Frontend', env: 'Production  ·  S3 + CloudFront', status: 'healthy', deployStatus: 'success', deployProgress: 100, lastDeploy: null, errors24h: 0, recentErrors: [], paused: false },
    { id: 'geos-landing', name: 'Geos Landing Page', env: 'Production  ·  S3 + CloudFront', status: 'healthy', deployStatus: 'success', deployProgress: 100, lastDeploy: null, errors24h: 0, recentErrors: [], paused: false },
];

let projects = [];
let costData = { total: 0, breakdown: {}, summary: {} };
let expandedId = null;

// =========================================================================
// Auth
// =========================================================================
function checkSession() { return sessionStorage.getItem('geos_admin') === 'true'; }

function login() {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value;
    if (user === ADMIN_USER && pass === ADMIN_PASS) {
        sessionStorage.setItem('geos_admin', 'true');
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('dashboard').classList.add('visible');
        document.getElementById('loginError').textContent = '';
        fetchData();
    } else {
        document.getElementById('loginError').textContent = 'Invalid credentials';
    }
}

function logout() {
    sessionStorage.removeItem('geos_admin');
    document.getElementById('loginOverlay').classList.remove('hidden');
    document.getElementById('dashboard').classList.remove('visible');
}

document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('logoutBtn').addEventListener('click', logout);

if (checkSession()) {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('dashboard').classList.add('visible');
    fetchData();
}

// =========================================================================
// Clock
// =========================================================================
function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleString('en-US', {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
}
updateClock();
setInterval(updateClock, 1000);

// =========================================================================
// Data fetching
// =========================================================================
async function fetchData() {
    if (!API_URL) {
        projects = FALLBACK_PROJECTS;
        renderAll();
        return;
    }

    try {
        const resp = await fetch(API_URL, {
            headers: API_TOKEN ? { Authorization: `Bearer ${API_TOKEN}` } : {},
        });
        if (!resp.ok) throw new Error(`${resp.status}`);
        const data = await resp.json();
        projects = data.projects || FALLBACK_PROJECTS;
        costData = data.cost || costData;
        renderAll();
    } catch (e) {
        console.error('API fetch failed:', e);
        projects = FALLBACK_PROJECTS;
        renderAll();
    }
}

// =========================================================================
// Render
// =========================================================================
function statusLabel(s) {
    return { healthy: 'Healthy', degraded: 'Degraded', down: 'Down', paused: 'Paused', deploying: 'Deploying' }[s] || s;
}

function fmtDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
           dt.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function renderAll() {
    renderSummary();
    renderProjects();
}

function renderSummary() {
    const total = projects.length;
    const healthy = projects.filter(p => p.status === 'healthy').length;
    const errors = projects.reduce((n, p) => n + (p.errors24h || 0), 0);
    document.getElementById('sumTotal').textContent = total;
    document.getElementById('sumHealthy').textContent = healthy;
    document.getElementById('sumErrors').textContent = errors;
    document.getElementById('sumCost').textContent = costData.total > 0
        ? '$' + costData.total.toFixed(2)
        : '—';
}

function renderProjects() {
    const grid = document.getElementById('projectsGrid');
    grid.innerHTML = '';

    projects.forEach(p => {
        const st = p.paused ? 'paused' : (p.status || 'healthy');
        const isExpanded = expandedId === p.id;
        const errCount = p.errors24h || 0;
        const ds = p.deployStatus || 'success';
        const dp = p.deployProgress ?? 100;

        // Errors HTML
        const errorsHtml = (p.recentErrors || []).length > 0
            ? `<div class="error-list">${(p.recentErrors || []).slice(0, 5).map(e =>
                `<div class="error-item">
                    <span class="error-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></span>
                    <span>${escHtml(e.msg || '')}</span>
                    <span class="error-time">${escHtml(e.time || '')}</span>
                </div>`).join('')}</div>` : '';

        // Cost breakdown for this project
        const costInfo = costData.summary || {};
        const isEcs = (p.env || '').includes('ECS');

        const card = document.createElement('div');
        card.className = 'project-card' + (isExpanded ? ' expanded' : '');
        card.innerHTML = `
            <div class="card-top">
                <div class="card-top-left">
                    <div class="project-name">${escHtml(p.name)}</div>
                    <div class="project-env">${escHtml(p.env)}</div>
                </div>
                <span class="status-badge ${st}">
                    <span class="dot"></span>
                    ${statusLabel(st)}
                </span>
            </div>

            <div class="card-stats">
                <div class="card-stat">
                    <span class="card-stat-label">Errors</span>
                    <span class="card-stat-value" style="color: ${errCount > 0 ? 'var(--error)' : 'var(--success)'}">${errCount}</span>
                </div>
                <div class="card-stat">
                    <span class="card-stat-label">Deploy</span>
                    <span class="card-stat-value" style="font-size:0.82rem">${ds === 'in-progress' ? dp + '%' : (ds === 'failed' ? 'Failed' : 'OK')}</span>
                </div>
                ${p.running !== undefined ? `
                <div class="card-stat">
                    <span class="card-stat-label">Tasks</span>
                    <span class="card-stat-value">${p.running}/${p.desired}</span>
                </div>` : ''}
            </div>

            <div class="card-deploy-bar">
                <div class="card-deploy-fill ${ds === 'in-progress' ? 'in-progress' : (ds === 'failed' ? 'failed' : 'success')}" style="width:${dp}%"></div>
            </div>

            <div class="expand-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>

            <div class="card-details">
                <div class="details-inner">
                    <div class="detail-metrics">
                        <div class="detail-metric">
                            <span class="detail-metric-label">Last Deploy</span>
                            <span class="detail-metric-value">${fmtDate(p.lastDeploy)}</span>
                        </div>
                        <div class="detail-metric">
                            <span class="detail-metric-label">Status</span>
                            <span class="detail-metric-value">${statusLabel(st)}</span>
                        </div>
                        ${p.running !== undefined ? `
                        <div class="detail-metric">
                            <span class="detail-metric-label">Running / Desired</span>
                            <span class="detail-metric-value">${p.running} / ${p.desired}</span>
                        </div>` : ''}
                        <div class="detail-metric">
                            <span class="detail-metric-label">Errors (24h)</span>
                            <span class="detail-metric-value" style="color: ${errCount > 0 ? 'var(--error)' : 'var(--success)'}">${errCount}</span>
                        </div>
                    </div>

                    ${errorsHtml}

                    ${isEcs ? `
                    <div class="detail-actions">
                        <button class="pause-btn ${p.paused ? 'paused' : ''}" data-id="${p.id}" onclick="event.stopPropagation(); togglePause('${p.id}')">
                            ${p.paused
                                ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Resume'
                                : '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Pause'}
                        </button>
                    </div>` : ''}
                </div>
            </div>
        `;

        // Toggle expand on card click
        card.addEventListener('click', (e) => {
            if (e.target.closest('.pause-btn')) return;
            expandedId = expandedId === p.id ? null : p.id;
            renderProjects();
        });

        grid.appendChild(card);
    });
}

function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function togglePause(projectId) {
    const proj = projects.find(p => p.id === projectId);
    if (!proj) return;
    const action = proj.paused ? 'resume' : 'pause';
    if (!confirm(`Are you sure you want to ${action} "${proj.name}"?`)) return;

    proj.paused = !proj.paused;
    proj.status = proj.paused ? 'paused' : 'healthy';
    renderAll();

    // TODO: Call Lambda to actually update ECS desired count
    console.log(`[Admin] ${action}: ${proj.name}`);
}

// Refresh
document.getElementById('refreshBtn').addEventListener('click', function () {
    this.classList.add('spinning');
    fetchData().finally(() => {
        setTimeout(() => this.classList.remove('spinning'), 400);
    });
});
</script>
